<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Create Post</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<div class="phone">
<div class="screen">

  <div class="topbar">
    <div class="avatar-dot"></div>
    <div class="page-title">Create Post</div>
  </div>

  <div class="main">

    <!-- Back Button -->
    <a href="{{ url_for('home') }}"
       class="primary-btn"
       style="display:block; text-align:center; width:100%; margin-bottom:20px;">
       Back to Home
    </a>

    <form method="POST">

      <!-- Post Information -->
      <div class="detail-block">

        <label>Type</label>
        <select name="type" class="input-gray">
          <option value="lost">Lost</option>
          <option value="found">Found</option>
        </select>

        <div style="height:16px;"></div>

        <label>Title</label>
        <input type="text" name="title" class="input-gray" required>

        <div style="height:16px;"></div>

        <label>Description</label>
        <textarea name="description" class="input-gray" rows="4" required></textarea>

        <div style="height:16px;"></div>

        <label>Location (optional)</label>
        <input type="text" name="location_text" class="input-gray">

        <div style="height:16px;"></div>

        <label>Date</label>
        <input type="date" name="date" class="input-gray">

      </div>


      <!-- Contact Information -->
      <div class="detail-block" style="margin-top:20px;">

        <h3 style="margin-top:0;">Contact Information</h3>

        <label for="phone">Phone Number</label>
        <input
          id="phone"
          name="phone"
          type="tel"
          class="input-gray"
          placeholder="optional"
        >

        <div style="height:14px;"></div>

        <label for="email">Email</label>
        <input
          id="email"
          name="email"
          type="email"
          class="input-gray"
          placeholder="optional"
        >

        <div style="height:14px;"></div>

        <label for="other_contact">Other Contact (Instagram / X / etc)</label>
        <input
          id="other_contact"
          name="other_contact"
          type="text"
          class="input-gray"
          placeholder="optional"
        >

      </div>


      <!-- Submit -->
      <button
        type="submit"
        class="primary-btn"
        style="width:100%; margin-top:20px;">
        Submit Post
      </button>

    </form>

  </div>

</div>
</div>

</body>
</html>
