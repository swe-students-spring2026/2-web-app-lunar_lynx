<!DOCTYPE html>
<html>
<head>
    <title>Create Post</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<div class="phone">
<div class="screen">

<div class="topbar">
    <div class="avatar-dot"></div>
    <div class="page-title">Make a Post</div>
</div>

<div class="main">

<h1 class="h1 center">Make a Post</h1>

<div class="form-wrap">

<form method="POST" action="/posts">

<div class="form-row">
<label for="type">Type</label>
<select id="type" name="type" class="input-gray" required>
<option value="lost">Lost</option>
<option value="found">Found</option>
</select>
</div>

<div class="form-row">
<label for="title">Title</label>
<input id="title" name="title" type="text" class="input-gray" required>
</div>

<div class="form-row">
<label for="description">Description</label>
<textarea id="description" name="description" class="textarea-gray" required></textarea>
</div>

<div class="form-row">
<label for="location_text">Location (optional)</label>
<input id="location_text" name="location_text" type="text" class="input-gray">
</div>

<div class="form-row">
<label for="date_lost_or_found">Date lost/found (optional)</label>
<input id="date_lost_or_found" name="date_lost_or_found" type="date" class="input-gray">
</div>

<button type="submit" class="primary-btn">Post</button>

</form>

</div>

<p class="center" style="margin-top:20px;">
<a href="/">Back to Home</a>
</p>

</div>

</div>
</div>

</body>
</html>
