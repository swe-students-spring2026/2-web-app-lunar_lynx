<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/authorization.css') }}">
</head>
<body>

<div class="page">
  <div class="auth-card">

    <div class="logo-circle"></div>
    <div class="app-title">Lost & Found</div>

    {% if error %}
      <p style="color:red; margin-bottom:12px;">{{ error }}</p>
    {% endif %}

    <form class="auth-form" method="POST" action="{{ url_for('login') }}">
      <input type="email" id="email" name="email" placeholder="Email" required>
      <input type="password" id="password" name="password" placeholder="Password" required>
      <button type="submit">Login</button>
    </form>

    <div class="auth-links">
      Don't have an account?
      <a href="{{ url_for('register') }}">Register here</a>
    </div>

  </div>
</div>

</body>
</html>
