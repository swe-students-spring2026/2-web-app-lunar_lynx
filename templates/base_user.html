<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ page_title or "Lost and Found" }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
  <div class="phone">
    <div class="screen">
      <div class="topbar">
        <div class="avatar-dot"></div>
        <div class="page-title">{{ top_label or "" }}</div>
      </div>

      <div class="main">
        {% block content %}{% endblock %}
      </div>

      <nav class="bottom-nav">
        <a class="tab {{ 'active' if active_tab=='lost' else '' }}" href="{{ url_for('list_posts', status='lost') }}">Lost</a>
        <a class="tab {{ 'active' if active_tab=='found' else '' }}" href="{{ url_for('list_posts', status='found') }}">Found</a>
        <a class="tab {{ 'active' if active_tab=='profile' else '' }}" href="{{ url_for('profile') }}">Profile</a>
      </nav>
    </div>
  </div>
</body>
</html>
