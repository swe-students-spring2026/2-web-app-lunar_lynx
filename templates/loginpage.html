<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/autherization.css') }}">
</head>
<body>
    <div class="page">
        <h2 class="page-title">Log In</h2>

        <!-- Card containing the login form and links -->
        <div class="auth-card">
            <div class="logo-circle"></div>
            <h1 class="app-title">Lost and Found</h1>

            <!--
                Login form (frontend only):
                - `email` accepts either a NetID or full email.
                - Client-side script will append `@nyu.edu` if only a NetID is entered.
                - Method/action kept in place so backend wiring is simple later.
            -->
            <form class="auth-form" method="POST" action="/login">
                <input type="text" name="email" placeholder="NetID or netid@nyu.edu" required>
                <input type="password" name="password" placeholder="Password" required>
                <button type="submit">Log In</button>
            </form>

            <!-- Helpful navigation links for users -->
            <div class="auth-links">
                <p>Need an account? <a href="/register">Click here to register.</a></p>
                <p>I’m an admin <a href="/admin-login">Click here to admin-login.</a></p>
            </div>
        </div>
    </div>

    <script>
        // Ensure NYU netid shorthand becomes a full NYU email on submit.
        // This keeps the front-end UX simple while allowing backends to
        // receive a normalized `user@nyu.edu` address later.
        const loginForm = document.querySelector('.auth-form');
        const emailInput = loginForm.querySelector('input[name="email"]');

        loginForm.addEventListener('submit', function () {
            const value = emailInput.value.trim().toLowerCase();
            if (value && !value.includes('@')) {
                emailInput.value = value + '@nyu.edu';
            }
        });
    </script>
</body>
</html>
