{% extends "base_user.html" %}
{% block content %}

<div class="profile-hero">
  <div class="profile-photo"></div>
  <div class="profile-name">{{ (user.name if user else "John Doe") }}</div>
  <div class="profile-handle">{{ (user.handle if user else "@johndoe224") }}</div>
  <a class="small-btn" href="{{ url_for('edit_profile') }}">Edit Profile</a>
</div>

<div class="section-head">Your Listings</div>

{% for it in listings %}
  <div class="listing-row">
    <div>{{ it.title }}</div>
    <div class="icon-actions">
      <a href="{{ url_for('post_edit', item_id=it._id) }}" aria-label="edit">
        <span class="icon edit"></span>
      </a>
      <a href="{{ url_for('post_delete', item_id=it._id) }}" aria-label="delete">
        <span class="icon trash"></span>
      </a>
    </div>
  </div>
{% endfor %}

{% endblock %}
