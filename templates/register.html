<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/authorization.css') }}">
</head>
<body>

<div class="page">
  <div class="auth-card">

    <div class="logo-circle"></div>
    <div class="app-title">Lost & Found</div>
    <div class="first-time-note">First time here? Create an account.</div>

    {% if error %}
      <p style="color:red; margin-bottom:12px;">{{ error }}</p>
    {% endif %}

    <form class="auth-form" method="POST" action="{{ url_for('register') }}">
      <input type="text" id="full_name" name="full_name" placeholder="Full Name">
      <input type="text" id="netid" name="netid" placeholder="NetID">
      <input type="email" id="email" name="email" placeholder="Email" required>
      <input type="password" id="password" name="password" placeholder="Password" required>
      <button type="submit">Register</button>
    </form>

    <div class="auth-links">
      Already have an account?
      <a href="{{ url_for('login') }}">Login here</a>
    </div>

  </div>
</div>

</body>
</html>
