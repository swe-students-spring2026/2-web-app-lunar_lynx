<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ page_title or "Admin" }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
  <div class="phone">
    <div class="screen">
      <div class="topbar">
        <div class="page-title">{{ top_label or "Admin" }}</div>
      </div>

      <div class="main">
        {% block content %}{% endblock %}
      </div>

      <nav class="admin-bottom-nav">
        <a class="tab {{ 'active' if active_tab=='inbox' else '' }}" href="{{ url_for('admin_inbox') }}">Report Inbox</a>
        <a class="tab {{ 'active' if active_tab=='history' else '' }}" href="{{ url_for('admin_history') }}">Action History</a>
        <a class="tab {{ 'active' if active_tab=='profile' else '' }}" href="{{ url_for('admin_profile') }}">Profile</a>
      </nav>
    </div>
  </div>
</body>
</html>
