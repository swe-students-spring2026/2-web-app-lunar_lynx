<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Profile</title>
</head>
<body>
    <h1>Edit Profile</h1>

    {% if error %}
        <p style="color:red;">{{ error }}</p>
    {% endif %}

    <form method="POST" action="{{ url_for('edit_profile') }}">
        <p>
            <label>Full Name: <input type="text" name="full_name" value="{{ user.full_name }}"></label>
        </p>
        <p>
            <label>NetID: <input type="text" name="netid" value="{{ user.netid }}"></label>
        </p>
        <p>
            <label>Email: <input type="email" name="email" value="{{ user.email }}"></label>
        </p>
        <p>
            <button type="submit">Save Changes</button>
            <a href="{{ url_for('profile') }}"><button type="button">Cancel</button></a>
        </p>
    </form>
</body>
</html>
